<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Кто ты из «Эгоиста»?</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            transition: width 0.3s ease;
        }
        .question { font-size: 1.3rem; margin-bottom: 20px; color: #f5f5f5; }
        .question-number { color: #FFD700; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .answers { display: flex; flex-direction: column; gap: 10px; }
        .answer-btn { 
            background: #1a1a1a; 
            border: 2px solid #444; 
            color: #f5f5f5; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .answer-btn:hover { border-color: #FFD700; background: #2a2a2a; transform: translateX(5px); }
        .hidden { display: none; }
        .result-card { text-align: center; padding: 40px 20px; }
        .result-image { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #FFD700; object-fit: cover; margin-bottom: 20px; }
        .result-title { color: #FFD700; font-size: 2.2rem; margin: 20px 0; }
        .result-description { color: #ccc; line-height: 1.8; font-size: 1.1rem; margin-bottom: 20px; }
        .result-quote { font-style: italic; color: #888; border-left: 3px solid #FFD700; padding-left: 20px; margin: 20px 0; text-align: left; }
        .warning { color: #FFD700; font-weight: bold; margin-top: 15px; }
        .share-btns { display: flex; gap: 10px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .start-screen { text-align: center; padding: 50px 20px; }
        .start-title { color: #FFD700; font-size: 2.8rem; margin-bottom: 15px; }
        .start-desc { color: #aaa; font-size: 1.2rem; margin-bottom: 40px; line-height: 1.6; }
        .chars { display: flex; justify-content: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; }
        .char { text-align: center; opacity: 0.7; }
        .char img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #666; object-fit: cover; }
        .char span { display: block; margin-top: 8px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body class="fade-in">

<div class="test-container">
    
    <!-- Старт -->
    <div id="startScreen" class="start-screen">
        <h1 class="start-title">Кто ты из «Эгоиста»?</h1>
        <p class="start-desc">
            Пройди тест из 12 вопросов и узнай, какой персонаж романа Джорджа Мередита<br>
            скрывается в тебе: блестящий эгоист, молчаливая героиня или надёжный друг?
        </p>
        
        <div class="chars">
            <div class="char">
                <img src="scene1.jpg" alt="Уиллоуби">
                <span>Сир Уиллоуби</span>
            </div>
            <div class="char">
                <img src="scene2.jpg" alt="Клара">
                <span>Клара Миддлтон</span>
            </div>
            <div class="char">
                <img src="scene3.jpg" alt="Вернон">
                <span>Вернон Уитфорд</span>
            </div>
        </div>
        
        <button class="btn gold" onclick="startTest()" style="font-size: 1.3rem; padding: 15px 40px;">
            Начать тест
        </button>
        <br><br>
        <a href="index.html" class="btn gray">← Вернуться к игре</a>
    </div>
    
    <!-- Вопрос -->
    <div id="quizScreen" class="hidden">
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="question">
            <span class="question-number">Вопрос <span id="currentQ">1</span> из 12</span>
            <div id="questionText"></div>
        </div>
        <div class="answers" id="answersContainer"></div>
    </div>
    
    <!-- Результат -->
    <div id="resultScreen" class="hidden result-card">
        <img id="resultImage" src="" class="result-image">
        <h2 class="result-title" id="resultTitle"></h2>
        <div class="result-description" id="resultDescription"></div>
        <div class="result-quote" id="resultQuote"></div>
        <div class="warning" id="resultWarning"></div>
        
        <div style="margin-top: 30px;">
            <a href="index.html" class="btn gold">Играть в «Эгоиста»</a>
            <button class="btn gray" onclick="restartTest()" style="margin-left: 10px;">Пройти ещё раз</button>
        </div>
        
        <div class="share-btns">
            <button class="btn" onclick="copyResult()" style="background: #444; color: white;">📋 Копировать результат</button>
        </div>
    </div>

</div>

<script>
const questions = [
    {
        q: "На балу к вам подходит незнакомец и начинает рассказывать о себе. Ваши действия?",
        a: [
            { text: "Слушаю внимательно, он же выбрал меня из всех!", w: 0, c: 2, v: 1 },
            { text: "Улыбаюсь и жду, когда можно будет уйти", w: 1, c: 3, v: 0 },
            { text: "Задаю вопросы, чтобы узнать его лучше", w: 0, c: 1, v: 3 },
            { text: "Сразу перехожу к себе — мне тоже есть что рассказать", w: 3, c: 0, v: 0 }
        ]
    },
    {
        q: "Ваш друг жалуется на проблемы. Что вы делаете?",
        a: [
            { text: "Даю советы, основанные на своём опыте", w: 3, c: 0, v: 1 },
            { text: "Слушаю молча, не хочу навязываться", w: 0, c: 2, v: 2 },
            { text: "Спрашиваю: «А что ты сам хочешь?»", w: 0, c: 1, v: 3 },
            { text: "Перевожу разговор на свои проблемы", w: 2, c: 1, v: 0 }
        ]
    },
    {
        q: "Вас критикуют за ваш выбор. Ваша реакция?",
        a: [
            { text: "«Вы просто не понимаете мои мотивы»", w: 3, c: 1, v: 0 },
            { text: "Молчу и переживаю в одиночестве", w: 0, c: 3, v: 1 },
            { text: "Спрашиваю, почему так считают", w: 0, c: 1, v: 3 },
            { text: "Соглашаюсь, чтобы не портить отношения", w: 0, c: 2, v: 2 }
        ]
    },
    {
        q: "Ваш идеальный вечер?",
        a: [
            { text: "Приём, где все восхищаются мной", w: 3, c: 0, v: 0 },
            { text: "Тихий вечер с книгой", w: 0, c: 3, v: 2 },
            { text: "Разговор по душам с близким человеком", w: 0, c: 2, v: 3 },
            { text: "Помогаю другу решить его проблемы", w: 0, c: 1, v: 3 }
        ]
    },
    {
        q: "В отношениях вам важнее всего?",
        a: [
            { text: "Чтобы партнёр соответствовал моему статусу", w: 3, c: 0, v: 0 },
            { text: "Стабильность и комфорт", w: 1, c: 3, v: 1 },
            { text: "Взаимное уважение и понимание", w: 0, c: 1, v: 3 },
            { text: "Я готова жертвовать собой ради любви", w: 1, c: 2, v: 0 }
        ]
    },
    {
        q: "Ваш друг выбрал не ту, по вашему мнению, партнёршу. Что вы скажете?",
        a: [
            { text: "«Ты заслуживаешь лучшего, как я»", w: 3, c: 0, v: 0 },
            { text: "Ничего, это его выбор", w: 0, c: 2, v: 2 },
            { text: "«Ты уверен, что она тебя слушает?»", w: 0, c: 1, v: 3 },
            { text: "Постараюсь полюбить её ради него", w: 0, c: 3, v: 1 }
        ]
    },
    {
        q: "Когда вы ошибаетесь, вы обычно?",
        a: [
            { text: "Нахожу объяснения, почему так вышло", w: 3, c: 1, v: 0 },
            { text: "Виню себя и долго переживаю", w: 0, c: 3, v: 1 },
            { text: "Признаю ошибку и исправляю", w: 0, c: 1, v: 3 },
            { text: "Стараюсь никому не показывать", w: 2, c: 2, v: 0 }
        ]
    },
    {
        q: "Ваше главное качество?",
        a: [
            { text: "Харизма и обаяние", w: 3, c: 0, v: 1 },
            { text: "Терпение и преданность", w: 0, c: 3, v: 2 },
            { text: "Искренность и внимание к другим", w: 0, c: 1, v: 3 },
            { text: "Умение находить общий язык", w: 2, c: 1, v: 2 }
        ]
    },
    {
        q: "Вас пригласили на мероприятие, но вы устали. Ваши действия?",
        a: [
            { text: "Пойду, нельзя упустить возможность блеснуть", w: 3, c: 0, v: 0 },
            { text: "Пойду, не хочу обидеть хозяев", w: 0, c: 3, v: 1 },
            { text: "Откажусь, мне важнее моё состояние", w: 1, c: 1, v: 3 },
            { text: "Пойду, если там будет кто-то важный", w: 2, c: 1, v: 0 }
        ]
    },
    {
        q: "Что для вас значит любовь?",
        a: [
            { text: "Нахождение идеального партнёра", w: 3, c: 1, v: 0 },
            { text: "Готовность терпеть ради близкого", w: 0, c: 3, v: 0 },
            { text: "Принятие другого таким, какой он есть", w: 0, c: 1, v: 3 },
            { text: "Взаимное восхищение друг другом", w: 2, c: 1, v: 2 }
        ]
    },
    {
        q: "Ваш друг одержал победу. Ваша реакция?",
        a: [
            { text: "«Я тоже когда-то добивался большего»", w: 3, c: 0, v: 0 },
            { text: "Искренне радуюсь за него", w: 0, c: 2, v: 3 },
            { text: "Радуюсь, но немного завидую", w: 1, c: 2, v: 1 },
            { text: "Боюсь, что он теперь забудет обо мне", w: 0, c: 3, v: 0 }
        ]
    },
    {
        q: "Ваш девиз в жизни?",
        a: [
            { text: "«Мир вращается вокруг меня»", w: 3, c: 0, v: 0 },
            { text: "«Лучше терпеть, чем потерять»", w: 0, c: 3, v: 0 },
            { text: "«Слушай больше, говори меньше»", w: 0, c: 1, v: 3 },
            { text: "«Важно быть хорошим для всех»", w: 1, c: 2, v: 1 }
        ]
    }
];

const results = {
    w: {
        name: "Сир Уиллоуби Паттерн",
        img: "scene1.jpg",
        desc: "Вы — блестящий эгоист. Харизматичны, обаятельны, уверены в своём превосходстве. Вы привыкли, что мир вращается вокруг вас, и искренне не понимаете, когда кто-то не разделяет этого мнения. Ваши манеры безупречны, но за ними скрывается неспособность по-настоящему слушать других.",
        quote: "«Я сделал тебя счастливой — разве этого недостаточно?»",
        warning: "⚠️ Внимание: ваши red flags видны из космоса. Прочитайте «Эгоиста» — узнайте, чем это кончилось."
    },
    c: {
        name: "Клара Миддлтон",
        img: "scene2.jpg",
        desc: "Вы — жертва обстоятельств и собственной доброты. Терпеливы, мягки, готовы приносить себя в жертву ради «гармонии». Вы молчите, когда хотите кричать, и улыбаетесь, когда хотите плакать. Ваша сила — в способности любить, но вы забываете любить себя.",
        quote: "«Я думала, если я буду достаточно хорошей, он изменится...»",
        warning: "💡 Совет: как Клара, вы заслуживаете быть услышанной. Не бойтесь говорить «нет»."
    },
    v: {
        name: "Вернон Уитфорд",
        img: "scene3.jpg",
        desc: "Вы — редкая жемчужина. Умеете слушать, не осуждаете, поддерживаете без навязывания. Вы не блестите в центре внимания, но именно вы спасаете тех, кто тонет в чужих эго. Ваш вопрос «А что ты сам хочешь?» — самый ценный подарок.",
        quote: "«Я не богат. Но я спрошу каждый день: что ты хочешь?»",
        warning: "✨ Вы — тот, кого не хватает в жизни многих. Не меняйтесь."
    }
};

let current = 0;
let scores = { w: 0, c: 0, v: 0 };

function startTest() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const q = questions[current];
    document.getElementById('currentQ').textContent = current + 1;
    document.getElementById('questionText').textContent = q.q;
    
    const progress = ((current + 1) / questions.length) * 100;
    document.getElementById('progressBar').style.width = progress + '%';
    
    const container = document.getElementById('answersContainer');
    container.innerHTML = '';
    
    q.a.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = ans.text;
        btn.onclick = () => answer(i);
        container.appendChild(btn);
    });
}

function answer(i) {
    const ans = questions[current].a[i];
    scores.w += ans.w;
    scores.c += ans.c;
    scores.v += ans.v;
    current++;
    
    if (current < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    
    let winner = 'c';
    if (scores.w > scores.c && scores.w > scores.v) winner = 'w';
    else if (scores.v > scores.c && scores.v > scores.w) winner = 'v';
    
    const r = results[winner];
    document.getElementById('resultImage').src = r.img;
    document.getElementById('resultTitle').textContent = r.name;
    document.getElementById('resultDescription').textContent = r.desc;
    document.getElementById('resultQuote').textContent = '«' + r.quote + '»';
    document.getElementById('resultWarning').textContent = r.warning;
}

function restartTest() {
    current = 0;
    scores = { w: 0, c: 0, v: 0 };
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
}

function copyResult() {
    const text = "Я — " + document.getElementById('resultTitle').textContent + " в тесте «Кто ты из Эгоиста?»! " + window.location.href;
    navigator.clipboard.writeText(text).then(() => {
        alert('Результат скопирован!');
    });
}
</script>

</body>
</html>
